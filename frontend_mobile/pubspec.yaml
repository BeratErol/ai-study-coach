name: frontend_mobile
description: "AI destekli öğrenci koçluk platformu"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Network
  dio: ^5.9.2
  flutter_secure_storage: ^10.0.0
  jwt_decoder: ^2.0.1

  # UI / Fonts
  google_fonts: ^8.1.0
  percent_indicator: ^4.2.5
  fl_chart: ^1.2.0
  table_calendar: ^3.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Storage
  shared_preferences: ^2.5.5
  intl: ^0.20.2
  shimmer: ^3.0.0
  flutter_local_notifications: ^18.0.1
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.6

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#4F46E5"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter_native_splash:
  color: "#4F46E5"
  image: assets/icon/app_icon.png
  color_dark: "#1E1B4B"
  image_dark: assets/icon/app_icon.png
  android_12:
    color: "#4F46E5"
    image: assets/icon/app_icon.png
    color_dark: "#1E1B4B"
    image_dark: assets/icon/app_icon.png
  web: false

flutter:
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/sounds/
